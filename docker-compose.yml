name: cosound

# Production stack for the DigitalOcean droplet.
# Usage: cp env/.env.production.example env/.env.production, fill it in, then
#   docker compose up -d --build

services:
  app:
    build: .
    restart: unless-stopped
    env_file: env/.env.production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    # pgvector/pgvector = official postgres image + the pgvector extension
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: cosound
      POSTGRES_USER: cosound
    # Provides POSTGRES_PASSWORD (and harmlessly, the app vars)
    env_file: env/.env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cosound -d cosound"]
      interval: 5s
      timeout: 5s
      retries: 12

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
