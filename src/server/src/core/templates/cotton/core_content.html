<div x-data
     x-init=" const hero = $el.querySelector('[data-core-content-hero]'); if (!hero) return; const update = () => { const h = hero.offsetHeight; hero.style.marginTop = `calc(50svh - ${h / 2}px)`; }; const ro = new ResizeObserver(update); ro.observe(hero); $nextTick(update); "
     class="motion-delay-200 motion-preset-expand min-h-[100svh] w-full flex flex-col items-center">{{ slot }}</div>
