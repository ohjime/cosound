<c-vars src="" alt="" bind_src="" bind_alt="" class="" />
<div
    {# djlint:off #}
    x-data="{
        loaded: false,
        {% if bind_src %}get _src() { return {{ bind_src }}; },{% endif %}
        init() {
            const img = this.$el.querySelector('img');
            if (img?.complete && img.naturalWidth > 0) this.loaded = true;
        },
    }"
    {% if bind_src %}
    x-effect="void _src; loaded = false; $nextTick(() => { const img = $el.querySelector('img'); if (img?.complete && img.naturalWidth > 0) loaded = true; });"
    {% endif %}
    {# djlint:on #}
    class="relative overflow-hidden {{ class }}">
    {# Skeleton shown while image is loading #}
    <div x-show="!loaded"
         x-transition:leave="transition ease-in duration-300"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="absolute inset-0 animate-pulse rounded-[inherit]"
         style="background: #1a1a1a; box-shadow: inset 0 0 24px 6px rgba(74, 222, 128, 0.35)"></div>
    {# Actual image, invisible until loaded #}
    <img {% if bind_src %}:src="{{ bind_src }}"{% else %}src="{{ src }}"{% endif %}
         {% if bind_alt %}:alt="{{ bind_alt }}"{% else %}alt="{{ alt }}"{% endif %}
         x-show="loaded"
         x-transition:enter="transition ease-out duration-500"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         @load="loaded = true"
         @error="loaded = true"
         class="w-full h-full object-cover block"
         style="display: none" />
</div>
