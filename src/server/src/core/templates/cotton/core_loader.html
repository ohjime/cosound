<c-vars hx_get="#" hx_target="this" />
<div hx-get="{{ hx_get }}"
     hx-trigger="revealed delay:1000ms"
     hx-target="{{ hx_target }}"
     hx-swap="outerHTML swap:300ms"
     class="flex-1 w-full flex items-center justify-center flex-col motion-ease-spring-smooth motion-duration-200 htmx-swapping:motion-opacity-out-0 htmx-swapping:motion-scale-out-75">
    <div class="content-loader my-12"></div>
</div>
