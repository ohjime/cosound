<style>
    #login_anon_form_loader {
        width: 0;
        opacity: 0;
        overflow: hidden;
        margin-left: 0;
        transition: width 160ms ease, opacity 160ms ease, margin-left 160ms ease;
    }

    #login_anon_form_loader.loading-active {
        width: 1.75rem;
        opacity: 1;
        margin-left: 0.5rem;
    }
</style>
<div class="w-full flex items-center justify-center flex-col"
     x-data="{ pressed: false }">
    <div class="divider divide-accent select-none">OR</div>
    <button id="anonymous_login_button"
            hx-post="{% url 'login:login_anonymously' %}"
            hx-swap="none"
            @click="pressed = true"
            :disabled="pressed"
            type="button"
            class="btn btn-neutral w-full mb-6">
        <span id="anonymous_login_button_label">CONTINUE ANONYMOUSLY</span>
        <span id="login_anon_form_loader"
              :class="{ 'loading-active': pressed }"
              class="loading loading-infinity loading-lg"></span>
    </button>
</div>
