<style>
    @property --radialprogress {
        syntax: '<percentage>';
        inherits: true;
        initial-value: 0%;
    }
</style>

<div x-show="!($store.soundLayers.started && !$store.soundLayers.tracksLoading)"
     x-cloak
     x-transition:leave="transition ease-in duration-300"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="absolute inset-0 z-50 rounded-b-4xl rounded-t-3xl bg-neutral-900/90 flex items-center justify-center">

    <!-- Loading state -->
    <div x-show="$store.soundLayers.tracksLoading"
         class="flex flex-col items-center gap-3 text-white">

        <div class="radial-progress text-primary brightness-110"
             :style="`--value:${$store.soundLayers.layers.length ? Math.round($store.soundLayers.loadedCount / $store.soundLayers.layers.length * 100) : 0}`"
             role="progressbar">
            <span x-text="`${$store.soundLayers.loadedCount} / ${$store.soundLayers.layers.length}`"
                  class="text-xs text-white"></span>
        </div>
        Loading sounds...
    </div>

    <!-- Ready state: tap anywhere to start -->
    <div x-show="!$store.soundLayers.tracksLoading"
         x-transition:enter="transition ease-out duration-500"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         @click="$store.soundLayers.playAll()"
         class="absolute inset-0 flex items-center justify-center cursor-pointer">
        <div class="skeleton-text skeleton !text-neutral-content !bg-base-content">Click anywhere to start</div>
    </div>

</div>
