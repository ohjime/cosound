<div id="mixer-master" class="join rounded-xl">

    <!-- Volume down: lowers all layer volumes -->
    <button class="btn btn-sm py-2 btn-soft join-item"
            @click="$store.soundLayers?.masterVolumeDown()">
        <svg xmlns="http://www.w3.org/2000/svg"
             viewBox="0 -960 960 960"
             fill="currentColor"
             class="size-[2em]">
            <path d="M200-360v-240h160l200-200v640L360-360H200Zm440 40v-322q45 21 72.5 65t27.5 97q0 53-27.5 96T640-320ZM480-606l-86 86H280v80h114l86 86v-252ZM380-480Z" />
        </svg>
    </button>

    <!-- Play / Pause toggle -->
    <button class="btn btn-sm py-2 join-item"
            :class="$store.soundLayers?.paused ? 'btn-success btn-soft' : 'btn-soft'"
            @click="$store.soundLayers?.paused ? $store.soundLayers.resume() : $store.soundLayers?.pause()">
        <svg xmlns="http://www.w3.org/2000/svg"
             viewBox="0 -960 960 960"
             fill="currentColor"
             class="size-[3em]">
            <path d="M200-312v-336l240 168-240 168Zm320-8v-320h80v320h-80Zm160 0v-320h80v320h-80Z" />
        </svg>
    </button>

    <!-- Save mix -->
    {# djlint:off #}
    <button class="btn btn-sm py-2 btn-soft join-item"
            hx-post="{% url 'mixer:save' %}"
            hx-swap="none"
            hx-vals='js:{
                layers: JSON.stringify(Alpine.store("soundLayers").layers.map(l => ({ sound_id: l.sound_id, sound_gain: Alpine.store("soundLayers").isSilenced(l) ? 0 : l.gain / 100 })))
            }'>
        <svg xmlns="http://www.w3.org/2000/svg"
             viewBox="0 -960 960 960"
             fill="currentColor"
             class="size-[2em]">
            <path d="M840-680v480q0 33-23.5 56.5T760-120H200q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h480l160 160Zm-80 34L646-760H200v560h560v-446ZM565-275q35-35 35-85t-35-85q-35-35-85-35t-85 35q-35 35-35 85t35 85q35 35 85 35t85-35ZM240-560h360v-160H240v160Zm-40-86v446-560 114Z" />
        </svg>
    </button>
    {# djlint:on #}

    <!-- Volume up: raises all layer volumes -->
    <button class="btn btn-sm py-2 btn-soft join-item"
            @click="$store.soundLayers?.masterVolumeUp()">
        <svg xmlns="http://www.w3.org/2000/svg"
             viewBox="0 -960 960 960"
             fill="currentColor"
             class="size-[2em]">
            <path d="M560-131v-82q90-26 145-100t55-168q0-94-55-168T560-749v-82q124 28 202 125.5T840-481q0 127-78 224.5T560-131ZM120-360v-240h160l200-200v640L280-360H120Zm440 40v-322q47 22 73.5 66t26.5 96q0 51-26.5 94.5T560-320ZM400-606l-86 86H200v80h114l86 86v-252ZM300-480Z" />
        </svg>
    </button>

</div>
