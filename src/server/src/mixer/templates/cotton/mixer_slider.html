<div class="z-20 flex flex-row items-center justify-center w-full px-5.5 gap-3">
    <button type="button"
            :disabled="$store.soundLayers.swappingLayer"
            class="btn btn-xs btn-circle border-none focus:outline-none bg-neutral-content text-white disabled:cursor-not-allowed"
            :class="!$store.soundLayers.swappingLayer && $store.soundLayers.isSilenced($store.soundLayers.currentLayer) ? '!bg-amber-500 !text-amber-900' : ''"
            @click="$store.soundLayers.toggleMute($store.soundLayers.currentLayer)">
        <svg class="fill-current size-[1.7em]"
             :class="$store.soundLayers.swappingLayer ? 'opacity-0' : ''"
             xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24"
             fill="currentColor">
            <path d="M3,9H7L12,4V20L7,15H3V9M16.59,12L14,9.41L15.41,8L18,10.59L20.59,8L22,9.41L19.41,12L22,14.59L20.59,16L18,13.41L15.41,16L14,14.59L16.59,12Z" />
        </svg>
    </button>
    <div class="w-full min-w-0 px-2 py-6 select-none touch-none"
        {# djlint:off #}
        x-data="{
            display: 0,
            dragging: false,
            moved: false,
            _startX: 0,
            _startY: 0,
            _isTouch: false,
            _raf: null,
            _disabled() { return $store.soundLayers.swappingLayer || $store.soundLayers.tracksLoading || !$store.soundLayers.started; },
            _faded() { return $store.soundLayers.isSilenced($store.soundLayers.currentLayer); },
            _animate(to) {
                cancelAnimationFrame(this._raf);
                if (Math.abs(to - this.display) < 0.1) { this.display = to; return; }
                const start = this.display;
                const t0 = performance.now();
                const ease = t => 1 - Math.pow(1 - t, 3);
                const step = (now) => {
                    const p = Math.min((now - t0) / 300, 1);
                    this.display = start + (to - start) * ease(p);
                    if (p < 1) this._raf = requestAnimationFrame(step);
                };
                this._raf = requestAnimationFrame(step);
            },
            _pctFromClientX(clientX, rect) {
                return Math.max(0, Math.min(100, ((clientX - rect.left) / rect.width) * 100));
            },
            _set(v) {
                cancelAnimationFrame(this._raf);
                this.display = v;
                $store.soundLayers.setGain($store.soundLayers.currentLayer, v);
            },
            beginDrag(e) {
                if (this._disabled()) return;
                this.dragging = true;
                this.moved = false;
                this._startX = e.clientX;
                this._startY = e.clientY;
                this._isTouch = e.pointerType === 'touch';
                e.currentTarget.setPointerCapture?.(e.pointerId);
            },
            dragMove(e) {
                if (!this.dragging) return;
                if (!this.moved) {
                    const threshold = this._isTouch ? 10 : 4;
                    if (Math.hypot(e.clientX - this._startX, e.clientY - this._startY) > threshold) this.moved = true;
                }
                if (this.moved) this._set(this._pctFromClientX(e.clientX, this.$refs.track.getBoundingClientRect()));
            },
            endDrag() {
                if (!this.dragging) return;
                this.dragging = false;
            },
            trackTap(e) {
                if (this._disabled()) return;
                this._set(this._pctFromClientX(e.clientX, this.$refs.track.getBoundingClientRect()));
            }
         }"
         x-init="display = (_disabled()) ? 50 : (($store.soundLayers.currentLayer.gain) ?? 50);"
         x-effect="_animate(_disabled() ? 50 : (($store.soundLayers.currentLayer.gain) ?? 50))"
        {# djlint:on #}
        >
        <div x-ref="track"
             class="relative h-2 w-full rounded-full bg-amber-500 transition-[filter]"
             :class="[(_disabled() || _faded()) ? 'grayscale' : '', _disabled() ? 'cursor-not-allowed' : 'cursor-pointer']"
             @pointerdown="trackTap($event)">
            <div class="absolute top-1/2 -translate-y-16 -translate-x-1/2 size-22 scale-y-75 scale-x-125 flex items-center justify-center pointer-events-none transition-[filter,scale,opacity] duration-300"
                 :class="[(_disabled() || _faded()) ? 'grayscale' : '', _disabled() ? 'scale-80' : '']"
                 :style="`left: ${display}%`">
                <svg xmlns="http://www.w3.org/2000/svg"
                     viewBox="0 -960 960 960"
                     class="rotate-90 drop-shadow-md pointer-events-none"
                     fill="currentColor"
                     :class="_disabled() ? 'text-neutral opacity-30' : (_faded() ? 'text-neutral-600 stroke-neutral-500' : 'text-amber-600 stroke-white')">
                    <path d="M400-280v-400l200 200-200 200Z" stroke-width="40" stroke-linejoin="round" class="pointer-events-auto" :class="_disabled() ? 'cursor-not-allowed' : 'cursor-grab active:cursor-grabbing'" @pointerdown.stop="beginDrag($event)" @pointermove="dragMove($event)" @pointerup="endDrag()" @pointercancel="dragging = false; moved = false" />
                    <ellipse cx="760" cy="-480" rx="120" ry="80" class="pointer-events-auto" :class="_disabled() ? 'cursor-not-allowed' : 'cursor-grab active:cursor-grabbing'" @pointerdown.stop="beginDrag($event)" @pointermove="dragMove($event)" @pointerup="endDrag()" @pointercancel="dragging = false; moved = false" />
                </svg>

            </div>
        </div>
    </div>
    <button type="button"
            :disabled="$store.soundLayers.swappingLayer"
            class="btn btn-xs btn-circle border-none focus:outline-none bg-neutral-content text-white disabled:cursor-not-allowed"
            :class="!$store.soundLayers.swappingLayer && $store.soundLayers.currentLayer.isolated ? '!bg-amber-500 !text-amber-900' : ''"
            @click="$store.soundLayers.toggleIsolate($store.soundLayers.currentLayer)">
        <svg xmlns="http://www.w3.org/2000/svg"
             viewBox="0 -960 960 960"
             :class="$store.soundLayers.swappingLayer ? 'opacity-0' : ''"
             class="size-[1.5em] fill-current">
            <path d="M160-200v-280q0-66 25-124.5t68.5-102Q297-750 355.5-775T480-800q66 0 124.5 25t102 68.5Q750-663 775-604.5T800-480v280H640v-240h80v-40q0-100-70-170t-170-70q-100 0-170 70t-70 170v40h80v240H160Z" />
        </svg>
    </button>
</div>
