<c-vars count="" />
<fieldset class="fieldset">
    <legend class="fieldset-legend text-neutral fill-neutral flex items-center gap-2">
        Search Collected Sounds
        <span id="sound-search-indicator"
              class="htmx-indicator loading loading-spinner loading-xs"></span>
    </legend>
    <label class="input bg-white outline-neutral">
        <svg class="h-[1em] opacity-50"
             xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24">
            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
            </g>
        </svg>
        <input type="search"
               id="sound-search-input"
               name="q"
               required
               placeholder="Search {{ count }} Sounds"
               hx-get="{% url 'mixer:search' %}"
               hx-trigger="input changed delay:300ms, search"
               hx-target="#sound-search-results"
               hx-swap="innerHTML"
               hx-indicator="#sound-search-indicator" />
    </label>
</fieldset>
