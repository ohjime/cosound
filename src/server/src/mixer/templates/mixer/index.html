{% partialdef mixer %}
    <c-core-card showExit="false" bgColor="bg-[#1f3f23]" ringColor="ring-[#2d2d2d]">
        <c-mixer-loading />
        <figure class="relative ring-7 ring-neutral-content/70 rounded-t-md mx-6 mt-7 overflow-visible bg-base-300">
            <div class="static aspect-square w-full rounded-t-md overflow-hidden">
                <div class="absolute z-10 top-0 right-1/2 translate-x-1/2 -translate-y-1/2 ring-4 ring-neutral-content/70 flex justify-center rounded-md overflow-hidden bg-white">
                    <c-mixer-card-header>
                        <c-mixer-layer-indicator />
                    </c-mixer-card-header>
                </div>
                <c-mixer-card-figure>
                    <c-mixer-layer-carousel />
                </c-mixer-card-figure>
            </div>
            <c-mixer-arrows />
        </figure>
        <c-mixer-slider />
        <div class="relative ring-5 ring-amber-600/60 mx-4 mb-4 rounded-xs rounded-b-2xl bg-white/65 text-black">
            <div class="h-30 overflow-y-auto py-2 px-4">
                <c-mixer-card-body>
                    <div class="italic font-serif font-extralight text-[8pt] font-stretch-95%">
                        <p class="py-1 not-italic font-bold font-serif text-xs font-stretch-95%"
                           x-text="'[ ' + $store.soundLayers.currentLayer.tags + ' ]'"></p>
                        <span x-text="$store.soundLayers.currentLayer.flavor"></span>
                    </div>
                </c-mixer-card-body>
            </div>
            <div class="pointer-events-none absolute inset-x-0 bottom-0 h-6 bg-gradient-to-t from-neutral-content/80 to-transparent rounded-b-2xl">
            </div>
        </div>
        <div class="absolute z-10 bottom-0 left-1/2 -translate-x-1/2 ring-6 ring-[#2d2d2d]/60 drop-shadow-2xl flex justify-center rounded-t-2xl overflow-hidden bg-base-100 w-fit">
            <c-mixer-layer-options />
        </div>
    </c-core-card>
{% endpartialdef %}

{% partialdef default_view %}
    <c-mixer-card-figure hx-swap-oob="outerHTML">
        <c-mixer-layer-carousel />
    </c-mixer-card-figure>
    <c-mixer-card-body hx-swap-oob="outerHTML">
        <div class="italic font-serif font-extralight text-xs font-stretch-95%">
            <p class="py-1 not-italic font-bold font-serif text-xs font-stretch-95%"
               x-text="'[ ' + $store.soundLayers.currentLayer.tags + ' ]'"></p>
            <span x-text="$store.soundLayers.currentLayer.flavor"></span>
        </div>
    </c-mixer-card-body>
{% endpartialdef %}

{% partialdef swap_view %}
    <c-mixer-card-figure hx-swap-oob="outerHTML">
        <c-mixer-swap-list :sounds="sounds" />
    </c-mixer-card-figure>
    <c-mixer-card-body hx-swap-oob="outerHTML">
        <c-mixer-swap-search count="{{ collection_size }}" />
    </c-mixer-card-body>
{% endpartialdef %}

{% partialdef swap_list_items %}
    <c-mixer-swap-list-items :sounds="sounds" />
{% endpartialdef %}
