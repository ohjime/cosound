<c-vars choice="" />
<!-- Vote button: UPVOTE (choice=1) or DOWNVOTE (choice=0) -->
<button type="button"
        x-data="{ voted: false }"
        @vote-success.window="voted = true"
        class="btn btn-sm px-4 rounded-none"
        hx-post="{% url 'vote:submit_vote' %}?{{ request.GET.urlencode }}"
        hx-swap="none"
        hx-disabled-elt="this"
        :disabled="voted || $store.voteOverlay?.state === 'throttle'"
        :class="{ 'btn-success': '{{ choice }}' === '1' && !voted, 'btn-error': '{{ choice }}' === '0' && !voted, 'btn-disabled': voted || $store.voteOverlay?.state === 'throttle' }">
    <template x-if="!voted">
        <span class="flex items-center">
            {% if choice == '1' %}
                <svg xmlns="http://www.w3.org/2000/svg"
                     viewBox="0 0 20 20"
                     fill="currentColor"
                     class="size-5">
                    <path d="M2 10.5a1.5 1.5 0 1 1 3 0v6a1.5 1.5 0 0 1-3 0v-6ZM6 10.333v5.43a2 2 0 0 0 1.106 1.79l.05.025A4 4 0 0 0 8.943 18h5.416a2 2 0 0 0 1.962-1.608l1.2-6A2 2 0 0 0 15.56 8H12V4a2 2 0 0 0-2-2 1 1 0 0 0-1 1v.667a4 4 0 0 1-.8 2.4L6.8 7.933a4 4 0 0 0-1.506 2.4Z" />
                </svg>
                <span class="px-1 font-bold tracking-widest">UPVOTE</span>
            {% elif choice == '0' %}
                <svg xmlns="http://www.w3.org/2000/svg"
                     viewBox="0 0 20 20"
                     fill="currentColor"
                     class="size-5">
                    <path d="M18 9.5a1.5 1.5 0 1 1-3 0v-6a1.5 1.5 0 0 1 3 0v6ZM14 9.667v-5.43a2 2 0 0 0-1.105-1.79l-.05-.025A4 4 0 0 0 11.055 2H5.64a2 2 0 0 0-1.962 1.608l-1.2 6A2 2 0 0 0 4.44 12H8v4a2 2 0 0 0 2 2 1 1 0 0 0 1-1v-.667a4 4 0 0 1 .8-2.4l1.4-1.866a4 4 0 0 0 1.505-2.4Z" />
                </svg>
                <span class="px-1 font-bold tracking-widest">DOWNVOTE</span>
            {% else %}
                <span class="px-1 font-bold tracking-widest">VOTE</span>
            {% endif %}
        </span>
    </template>
    <template x-if="voted">
        <span class="px-1 font-bold tracking-widest">VOTE SENT</span>
    </template>
</button>
