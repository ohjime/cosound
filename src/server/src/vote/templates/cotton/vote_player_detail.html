<c-vars player_name="" player_photo_url="" manager_name="" section="" choice="" />
<figure x-data="votePlayerDetailData()"
        x-init="init()"
        class="relative text-white h-fit w-full overflow-hidden rounded-t-box bg-base-300">
    <div :class="loaded ? 'opacity-0' : 'opacity-100'"
         class="skeleton absolute inset-0 z-20 w-full h-full max-w-full max-h-72 rounded-none bg-base-100/70 ring-1 ring-base-content/20 transition-opacity duration-500 motion-duration-500"
         aria-hidden="true"></div>
    <img src="{{ player_photo_url }}"
         x-ref="playerPhoto"
         alt="{{ player_name }}"
         loading="eager"
         decoding="async"
         @load="loaded = true"
         @error="loaded = true"
         :class="loaded ? 'opacity-100' : 'opacity-0'"
         class="absolute inset-0 z-0 w-full h-full object-cover transition-opacity duration-500 motion-duration-500">
    <div class="absolute inset-0 z-10 bg-black/45"></div>
    <div :class="loaded ? 'opacity-100' : 'opacity-0'"
         class="relative z-30 flex flex-col text-left pt-10 pb-8 px-6 w-full transition-opacity duration-500 motion-duration-500">
        <h1 class="text-2xl font-bold tracking-wide">{{ player_name }}</h1>
        <h3 class="text-md font-medium text-gray-200 mt-1">{{ manager_name }}</h3>
        <div class="mt-6 flex flex-col flex-wrap items-start gap-2">
            <span class="badge badge-outline text-[8px] text-gray-50 font-extrabold uppercase tracking-widest leading-none py-2 truncate max-w-full">
                {% if section %}
                    {{ section }}
                {% else %}
                    General
                {% endif %}
            </span>
            {% if choice == '1' %}
                <span class="badge badge-success text-[12px] text-success-content font-bold uppercase tracking-widest leading-none py-3">UPVOTING</span>
            {% elif choice == '0' %}
                <span class="badge badge-error text-[12px] text-error-content font-bold uppercase tracking-widest leading-none py-3">DOWNVOTING</span>
            {% endif %}
        </div>
    </div>
</figure>
<script>
    function votePlayerDetailData() {
        return {
            loaded: false,
            init() {
                if (this.$refs.playerPhoto && this.$refs.playerPhoto.complete) {
                    this.loaded = true;
                }
            },
        };
    }
</script>
