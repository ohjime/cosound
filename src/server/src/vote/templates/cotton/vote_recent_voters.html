{# djlint:off #}
<div x-data="{
        voters: [],
        _tick: null,
        init() {
            this._tick = setInterval(() => {
                this.voters = this.voters.map(v => ({ ...v, seconds_ago: v.seconds_ago + 1 }));
            }, 1000);
        },
        destroy() { if (this._tick) clearInterval(this._tick); },
        formatAgo(s) {
            if (s < 60) return s + 's ago';
            if (s < 3600) return Math.floor(s / 60) + 'm ago';
            return Math.floor(s / 3600) + 'h ago';
        }
     }"
     @vote-success.window="if ($event.detail && $event.detail.voters) voters = $event.detail.voters"
     x-show="voters.length > 0"
     x-transition.opacity.duration.300ms
     class="flex flex-col items-center gap-2 w-full max-w-80">
{# djlint:on #}
<ul class="list w-full">
    <li class="pb-2 text-xs opacity-60 tracking-wide">Recent Votes at this Location</li>
    <template x-for="v in voters" :key="v.id">
        <li class="list-row items-center gap-2">
            <div class="avatar">
                <div class="size-12 rounded-full">
                    <img :src="v.voter_avatar_url" :alt="v.voter_username" />
                </div>
            </div>
            <div class="min-w-0 flex flex-col gap-0.5">
                <div class="truncate text-xs font-mono" x-text="v.voter_username"></div>
                <div class="truncate text-[11px] font-serif italic opacity-80"
                     x-text="v.player_name"></div>
                <div class="flex items-center gap-1.5">
                    <span class="text-[10px] uppercase tracking-wide opacity-60"
                          x-text="formatAgo(v.seconds_ago)"></span>
                    <template x-if="v.section">
                        <span class="badge badge-info badge-xs" x-text="v.section"></span>
                    </template>
                </div>
            </div>
            <span :class="v.value === 1 ? 'bg-success' : 'bg-error'"
                  class="badge badge-lg rounded-full aspect-square p-0 text-white border-0">
                <svg x-show="v.value === 1"
                     xmlns="http://www.w3.org/2000/svg"
                     viewBox="0 0 20 20"
                     fill="currentColor"
                     class="size-5">
                    <path d="M2 10.5a1.5 1.5 0 1 1 3 0v6a1.5 1.5 0 0 1-3 0v-6ZM6 10.333v5.43a2 2 0 0 0 1.106 1.79l.05.025A4 4 0 0 0 8.943 18h5.416a2 2 0 0 0 1.962-1.608l1.2-6A2 2 0 0 0 15.56 8H12V4a2 2 0 0 0-2-2 1 1 0 0 0-1 1v.667a4 4 0 0 1-.8 2.4L6.8 7.933a4 4 0 0 0-1.506 2.4Z" />
                </svg>
                <svg x-show="v.value === 0"
                     xmlns="http://www.w3.org/2000/svg"
                     viewBox="0 0 20 20"
                     fill="currentColor"
                     class="size-5">
                    <path d="M18 9.5a1.5 1.5 0 1 1-3 0v-6a1.5 1.5 0 0 1 3 0v6ZM14 9.667v-5.43a2 2 0 0 0-1.105-1.79l-.05-.025A4 4 0 0 0 11.055 2H5.64a2 2 0 0 0-1.962 1.608l-1.2 6A2 2 0 0 0 4.44 12H8v4a2 2 0 0 0 2 2 1 1 0 0 0 1-1v-.667a4 4 0 0 1 .8-2.4l1.4-1.866a4 4 0 0 0 1.505-2.4Z" />
                </svg>
            </span>
        </li>
    </template>
</ul>
</div>
