<c-vars avatar_url="" username="" welcome_text="" wrapper_class="" choice="" />
<div class="absolute top-0 left-6 right-6 -translate-y-1/3 z-20 flex items-center justify-between gap-3 {{ wrapper_class }}">
    <div class="flex flex-col items-start gap-3 min-w-0 flex-1 translate-y-6">
        <span class="text-[10px] uppercase tracking-widest opacity-70 leading-none truncate max-w-full">{{ welcome_text }}</span>
        <div class="badge badge-neutral text-xs font-bold capitalize tracking-widest font-mono px-3 py-3 max-w-full">
            <span class="truncate">{{ username }}</span>
        </div>
    </div>
    <div x-data="voteUserAvatarData()" x-init="init()" class="avatar indicator shrink-0">
        {% if choice == '1' %}
            <span class="indicator-item indicator-bottom indicator-start badge badge-success w-8 h-8 rounded-full shadow border-2 border-base-100 p-0 flex items-center justify-center mb-3 ml-2 cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg"
                     class="h-4 w-4 text-success-content"
                     viewBox="0 0 20 20"
                     fill="currentColor">
                    <path d="M2 10.5a1.5 1.5 0 113 0v6a1.5 1.5 0 01-3 0v-6zM6 10.333v5.43a2 2 0 001.106 1.79l.05.025A4 4 0 008.943 18h5.416a2 2 0 001.962-1.608l1.2-6A2 2 0 0015.56 8H12V4a2 2 0 00-2-2 1 1 0 00-1 1v.667a4 4 0 01-.8 2.4L6.8 7.933a4 4 0 00-1.506 2.4z" />
                </svg>
            </span>
        {% elif choice == '0' %}
            <span class="indicator-item indicator-bottom indicator-start badge badge-error w-8 h-8 rounded-full shadow border-2 border-base-100 p-0 flex items-center justify-center mb-3 ml-2 cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg"
                     class="h-4 w-4 text-error-content"
                     viewBox="0 0 20 20"
                     fill="currentColor">
                    <path d="M18 9.5a1.5 1.5 0 11-3 0v-6a1.5 1.5 0 013 0v6zM14 9.667v-5.43a2 2 0 00-1.105-1.79l-.05-.025A4 4 0 0011.055 2H5.64a2 2 0 00-1.962 1.608l-1.2 6A2 2 0 004.44 12H8v4a2 2 0 002 2 1 1 0 001-1v-.667a4 4 0 01.8-2.4l1.4-1.866a4 4 0 001.505-2.4z" />
                </svg>
            </span>
        {% endif %}
        <div class="relative w-24 h-24 rounded-full ring-4 ring-offset-2 ring-offset-base-100 overflow-hidden {% if choice == '1' %}ring-success{% elif choice == '0' %}ring-error{% else %}ring-primary{% endif %}">
            <div :class="loaded ? 'opacity-0' : 'opacity-100'"
                 class="skeleton absolute inset-0 z-10 rounded-full transition-opacity duration-500 motion-duration-500"
                 aria-hidden="true"></div>
            <span :class="loaded ? 'opacity-0' : 'opacity-100'"
                  class="loading loading-spinner loading-xl absolute inset-0 z-20 m-auto text-base-content transition-opacity duration-500 motion-duration-500"
                  aria-label="Loading avatar"></span>
            <img src="{{ avatar_url }}"
                 x-ref="avatarImage"
                 alt="Voter avatar"
                 loading="eager"
                 decoding="async"
                 @load="loaded = true"
                 @error="loaded = true"
                 :class="loaded ? 'opacity-100' : 'opacity-0'"
                 class="absolute inset-0 w-full h-full object-cover transition-opacity duration-500 motion-duration-500" />
        </div>
    </div>
</div>
<script>
    function voteUserAvatarData() {
        return {
            loaded: false,
            init() {
                if (this.$refs.avatarImage && this.$refs.avatarImage.complete) {
                    this.loaded = true;
                }
            },
        };
    }
</script>
